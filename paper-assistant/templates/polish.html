{% extends "base.html" %}
{% block title %}文本润色 — 论文助手{% endblock %}
{% block content %}

<div class="tool-page">
    <h2>文本润色</h2>
    <p class="tool-subtitle">按 Nature 期刊风格润色学术文本（支持中英文）</p>

    <div class="tool-form">
        <div class="form-group">
            <label>粘贴需要润色的文本</label>
            <textarea id="polishInput" rows="8" placeholder="粘贴段落、摘要、引言或任何学术文本…支持中文草稿"></textarea>
        </div>
        <div class="form-group">
            <label>补充提示词（可选）</label>
            <input type="text" id="extraPrompt" placeholder="例如：保持原意不变，提升学术表达；缩短到150词以内；改为主动语态…">
        </div>
        <button class="btn btn-primary btn-lg" id="polishBtn" onclick="polishText()">开始润色</button>
    </div>

    <div id="polishStatus" class="tool-status" style="display:none;"></div>

    <div id="outputArea" class="tool-output" style="display:none;">
        <div class="output-header">
            <span>✨ 润色结果</span>
            <button class="btn btn-sm btn-outline" onclick="copyResult()">复制</button>
        </div>
        <div id="outputText" class="output-text"></div>
    </div>
</div>

{% endblock %}

{% block scripts %}
<script>
async function polishText() {
    const text = document.getElementById('polishInput').value.trim();
    const extra = document.getElementById('extraPrompt').value.trim();
    if (!text) return;

    const btn = document.getElementById('polishBtn');
    const status = document.getElementById('polishStatus');
    const output = document.getElementById('outputArea');
    const result = document.getElementById('outputText');

    btn.disabled = true; btn.textContent = '润色中…';
    status.style.display = 'block';
    status.innerHTML = '<span class="spinner"></span> AI 正在润色文本…';
    output.style.display = 'none';

    try {
        const resp = await fetch('/api/polish', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ text: text, extra_prompt: extra }),
        });
        const data = await resp.json();
        status.style.display = 'none';
        if (data.result) {
            result.innerHTML = escapeHtml(data.result).replace(/\n/g, '<br>');
            output.style.display = 'block';
        } else {
            status.innerHTML = '<span style="color:#dc2626;">润色失败：' + (data.error || '未知错误') + '</span>';
        }
    } catch (e) {
        status.innerHTML = '<span style="color:#dc2626;">网络错误</span>';
    }
    btn.disabled = false; btn.textContent = '开始润色';
}

function copyResult() {
    const text = document.getElementById('outputText').innerText;
    navigator.clipboard.writeText(text).then(() => {
        const btn = event.target;
        const orig = btn.textContent;
        btn.textContent = '已复制'; setTimeout(() => btn.textContent = orig, 1500);
    });
}

function escapeHtml(s) {
    const div = document.createElement('div');
    div.textContent = s;
    return div.innerHTML;
}
</script>
{% endblock %}
